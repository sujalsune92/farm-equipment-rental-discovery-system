name: farm_rental
description: Farm Equipment Rental Discovery Platform — Supabase Edition

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ──────────────────────────────────────────────────────
  provider: ^6.1.2                  # ← was missing, caused all context.watch errors

  # ── Supabase ──────────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── Location ──────────────────────────────────────────────────────────────
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # ── Image handling ────────────────────────────────────────────────────────
  image_picker: ^1.0.7

  # ── UI helpers ────────────────────────────────────────────────────────────
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.1
  uuid: ^4.3.3
  timeago: ^3.6.1
  badges: ^3.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.5
  http: ^1.1.0
  tflite_flutter: ^0.12.1
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
